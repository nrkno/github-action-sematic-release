name: semrel
description: >
  Conventional-commit linter, semantic versioner, GitHub Release creator,
  PR notifier, and release notes generator — in one self-owned Go binary.
author: NRK Platform

branding:
  icon: tag
  color: blue

inputs:
  subcommand:
    description: >
      Subcommand to run: lint, release, notify, or notes.
    required: true
  token:
    description: GitHub token used for API calls and pushing tags.
    required: false
    default: ${{ github.token }}
  dry-run:
    description: >
      Skip tag creation, push, and release creation. Prints what would happen.
    required: false
    default: "false"
  working-directory:
    description: Path to the git repository root. Defaults to workspace root.
    required: false
    default: .

outputs:
  # Direct name-for-name mappings (binary key == declared output name)
  released:
    description: "'true' if a new release was published, 'false' otherwise."
    value: ${{ steps.run.outputs.released }}
  version:
    description: "The released version, e.g. '1.2.3'."
    value: ${{ steps.run.outputs.version }}
  tag:
    description: "The released git tag, e.g. 'v1.2.3'."
    value: ${{ steps.run.outputs.tag }}
  bump:
    description: "Version bump type: major, minor, patch, or none."
    value: ${{ steps.run.outputs.bump }}
  notes:
    description: "Rendered markdown release notes."
    value: ${{ steps.run.outputs.notes }}
  sha:
    description: "HEAD commit SHA at time of release."
    value: ${{ steps.run.outputs.sha }}
  # Cross-mapped: binary writes 'major/minor/patch', action declares
  # 'major_version/minor_version/patch_version'. Both sets exposed.
  major_version:
    description: "Major version component (integer)."
    value: ${{ steps.run.outputs.major }}
  minor_version:
    description: "Minor version component (integer)."
    value: ${{ steps.run.outputs.minor }}
  patch_version:
    description: "Patch version component (integer)."
    value: ${{ steps.run.outputs.patch }}
  # Raw binary output names as aliases for consumers using the short form
  major:
    description: "Major version component (integer). Alias for major_version."
    value: ${{ steps.run.outputs.major }}
  minor:
    description: "Minor version component (integer). Alias for minor_version."
    value: ${{ steps.run.outputs.minor }}
  patch:
    description: "Patch version component (integer). Alias for patch_version."
    value: ${{ steps.run.outputs.patch }}

runs:
  using: composite
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

    - id: verify
      shell: bash
      env:
        ACTION_IMAGE_REPO: ${{ github.action_repository }}
        ACTION_IMAGE_TAG: ${{ github.action_ref }}
      run: |
        cosign verify "ghcr.io/${ACTION_IMAGE_REPO}:${ACTION_IMAGE_TAG}" \
          --certificate-identity-regexp "https://github.com/nrkno/github-action-sematic-release/.github/workflows/.*" \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

    - id: run
      shell: bash
      env:
        # Inject all INPUT_* vars explicitly — composite steps do NOT receive
        # INPUT_* automatically (unlike Docker/JS actions).
        GITHUB_TOKEN: ${{ inputs.token }}
        INPUT_SUBCOMMAND: ${{ inputs.subcommand }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        ACTION_IMAGE_REPO: ${{ github.action_repository }}
        ACTION_IMAGE_TAG: ${{ github.action_ref }}
      run: |
        # Explicit allowlist — only vars semrel actually consumes (verified
        # against internal/env/env.go, cmd/semrel/main.go, internal/cli/cli.go,
        # and entrypoint.sh). Never dump the full environment: that would leak
        # ACTIONS_RUNTIME_TOKEN, ACTIONS_ID_TOKEN_REQUEST_TOKEN, and other
        # job-level secrets into the container.
        # NOTE: --env-file is line-oriented and does not support multiline values.
        # All vars below are single-line; this is safe for this action.
        # Do not add vars with multiline values without revisiting this approach.
        cat > "$RUNNER_TEMP/semrel-env" <<EOF
        GITHUB_TOKEN=$GITHUB_TOKEN
        GITHUB_API_URL=$GITHUB_API_URL
        GITHUB_REPOSITORY=$GITHUB_REPOSITORY
        GITHUB_REF=$GITHUB_REF
        GITHUB_REF_NAME=$GITHUB_REF_NAME
        GITHUB_SHA=$GITHUB_SHA
        GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME
        GITHUB_BASE_REF=$GITHUB_BASE_REF
        GITHUB_EVENT_PATH=$GITHUB_EVENT_PATH
        GITHUB_OUTPUT=$GITHUB_OUTPUT
        GITHUB_RUN_ID=$GITHUB_RUN_ID
        GITHUB_ACTOR=$GITHUB_ACTOR
        GITHUB_SERVER_URL=$GITHUB_SERVER_URL
        GITHUB_ACTIONS=$GITHUB_ACTIONS
        SEMREL_LOG_LEVEL=$SEMREL_LOG_LEVEL
        INPUT_SUBCOMMAND=$INPUT_SUBCOMMAND
        INPUT_TOKEN=$INPUT_TOKEN
        INPUT_DRY_RUN=$INPUT_DRY_RUN
        INPUT_WORKING_DIRECTORY=$INPUT_WORKING_DIRECTORY
        SEMREL_TAG=$SEMREL_TAG
        SEMREL_RELEASE_URL=$SEMREL_RELEASE_URL
        EOF
        chmod 600 "$RUNNER_TEMP/semrel-env"

        # Identity-mount GITHUB_WORKSPACE and RUNNER_TEMP so the container sees
        # the same absolute paths as the host. RUNNER_TEMP covers GITHUB_OUTPUT,
        # GITHUB_STEP_SUMMARY, GITHUB_ENV, and GITHUB_STATE (all live there).
        # ACTION_IMAGE_TAG is the exact ref written in the consumer's uses: field
        # (e.g. v0.11.0 or a full 40-char commit SHA) — the image is tagged with
        # both, so either pinning style resolves to the correct image.
        docker run --rm \
          --env-file "$RUNNER_TEMP/semrel-env" \
          -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
          -v "$RUNNER_TEMP:$RUNNER_TEMP" \
          -w "$GITHUB_WORKSPACE" \
          "ghcr.io/${ACTION_IMAGE_REPO}:${ACTION_IMAGE_TAG}"
