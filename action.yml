name: semrel
description: >
  Conventional-commit linter, semantic versioner, GitHub Release creator,
  PR notifier, and release notes generator — in one self-owned Go binary.
author: NRK Platform

branding:
  icon: tag
  color: blue

inputs:
  subcommand:
    description: >
      Subcommand to run: lint, release, notify, or notes.
    required: true
  token:
    description: GitHub token used for API calls and pushing tags.
    required: false
    default: ${{ github.token }}
  dry-run:
    description: >
      Skip tag creation, push, and release creation. Prints what would happen.
    required: false
    default: "false"
  working-directory:
    description: Path to the git repository root. Defaults to workspace root.
    required: false
    default: .

outputs:
  released:
    description: "'true' if a new release was published, 'false' otherwise."
  version:
    description: "The released version, e.g. '1.2.3'."
  tag:
    description: "The released git tag, e.g. 'v1.2.3'."
  major_version:
    description: "Major version component (integer)."
  minor_version:
    description: "Minor version component (integer)."
  patch_version:
    description: "Patch version component (integer)."
  bump:
    description: "Version bump type: major, minor, patch, or none."
  notes:
    description: "Rendered markdown release notes."
  sha:
    description: "HEAD commit SHA at time of release."

runs:
  using: docker
  # release.yml overwrites this line with the real release tag on every release.
  # Supply-chain integrity is provided by cosign keyless signatures — see README.md.
  image: docker://ghcr.io/nrkno/github-action-sematic-release:v0.10.6
  env:
    # The following env vars are passed by callers via step-level env: blocks
    # and are forwarded automatically to the container by the Actions runner.
    # SEMREL_TAG, SEMREL_VERSION, SEMREL_RELEASE_URL — used by subcommand: notify
    GITHUB_TOKEN: ${{ inputs.token }}
