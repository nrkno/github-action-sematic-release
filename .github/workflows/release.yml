name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read    # required for ListPRsForCommit (PR logging)
    outputs:
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}
      released: ${{ steps.semrel.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: go build -o semrel ./cmd/semrel
      - id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./semrel release
      - run: |
          echo "### Release ${{ steps.semrel.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit SHA (use this to pin the action): \`$(git rev-parse HEAD)\`" >> $GITHUB_STEP_SUMMARY
          ./semrel notes >> $GITHUB_STEP_SUMMARY
        if: steps.semrel.outputs.released == 'true'

  publish-image:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: builddate
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - id: push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag }}
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.builddate.outputs.date }}
      - uses: sigstore/cosign-installer@v3
      # Sign by digest so the signature is bound to immutable content, not a
      # mutable tag.
      - run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: 1
      - name: Update action.yml image reference and retag
        env:
          TAG: ${{ needs.release.outputs.tag }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          sed -i "s|image: docker://.*|image: docker://ghcr.io/${{ github.repository }}:${TAG}@${DIGEST}|" action.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add action.yml
          git commit -m "chore(release): update action image to ${TAG}"
          # Move the annotated tag to the new commit so consumers pin to the
          # commit that actually contains the correct image reference.
          git tag -f -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}" --force
          git push origin main
      - name: Capture release commit SHA
        id: release_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  notify:
    needs: [release, publish-image]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: go build -o semrel ./cmd/semrel
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMREL_RELEASED: ${{ needs.release.outputs.released }}
          SEMREL_VERSION: ${{ needs.release.outputs.version }}
          SEMREL_TAG: ${{ needs.release.outputs.tag }}
        run: ./semrel notify
