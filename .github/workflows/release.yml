name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: read    # required for ListPRsForCommit (PR logging)
    outputs:
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}
      released: ${{ steps.semrel.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - run: go build -o semrel ./cmd/semrel
      - id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./semrel release
      - run: |
          echo "### Release ${{ steps.semrel.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit SHA (use this to pin the action): \`$(git rev-parse HEAD)\`" >> $GITHUB_STEP_SUMMARY
          ./semrel notes >> $GITHUB_STEP_SUMMARY
        if: steps.semrel.outputs.released == 'true'

      - name: Trigger Docker image build
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run docker.yml \
            --ref main \
            --field tag=${{ steps.semrel.outputs.tag }}

