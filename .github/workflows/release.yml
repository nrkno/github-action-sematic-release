name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: read    # required for ListPRsForCommit (PR logging)
    outputs:
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}
      released: ${{ steps.semrel.outputs.released }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version: '1.25'
      - run: go build -o semrel ./cmd/semrel
      - id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./semrel release
      - run: |
          {
            echo "### Release ${{ steps.semrel.outputs.tag }}"
            echo "Commit SHA (use this to pin the action): \`$(git rev-parse HEAD)\`"
            ./semrel notes
          } >> "$GITHUB_STEP_SUMMARY"
        if: steps.semrel.outputs.released == 'true'

      - name: Trigger Docker image build
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run docker.yml \
            --ref main \
            --field tag=${{ steps.semrel.outputs.tag }}

