name: Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build image for (e.g. v0.10.1)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.tag || github.ref_name }}
            type=sha,prefix=sha-,format=short

      - name: Build date
        id: builddate
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.tag || github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.builddate.outputs.date }}
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}

      - name: Update action.yml and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          BRANCH="chore/update-action-image-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          sed -i "s|image: docker://.*|image: docker://ghcr.io/${{ github.repository }}:${TAG}|" action.yml
          git add action.yml
          git commit -m "chore(release): update action image to ${TAG}"
          git push origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(release): update action image to ${TAG}" \
            --body "Automated PR to update \`action.yml\` with the Docker image published for ${TAG}."
